<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>playlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="main-box">
        <div class="playlist-header">
            <h2>x&emsp;&emsp;&emsp;
                &emsp;&nbsp;
                Playlist</h2>
        </div>

        <div class="random-love">
        
        <div class="album-art"></div>
        
        <div class="album-text">
            <h1>Random<br>Love</h1>
            <p>by Divay Kapoor</p>
        </div>
        
    </div>

        <div id="buttons">
            <div class="play">▶ PLAY</div>
            <div class="like">♥</div>
            <div class="add">+</div>
        </div>
       
        <div class="music-list"></div>
            <div class="song-item">
                <div class="song-icon matargasti"></div>
                <div class="song-info">
                    <div class="song-title">Matargasti</div>
                    <div class="song-artist">Mohit Chauhan</div>
                </div>
            </div>

            <div class="song-item">
            <div class="song-icon attitude"></div>
            <div class="song-info">
                <div class="song-title">Attitude</div>
                <div class="song-artist">Lewis OfMan Attitude</div>
            </div>
            </div>

            <div class="song-item">
            <div class="song-icon try-everything"></div>
            <div class="song-info">
                <div class="song-title">Try everything</div>
                <div class="song-artist">Shakira Zootopia</div>
            </div>
            </div>

            <div class="song-item">
            <div class="song-icon sunflower"></div>
            <div class="song-info">
                <div class="song-title">Sunflower</div>
                <div class="song-artist">Joseph Vincent Sunflower</div>
            </div>
            </div>
    </div>
    
</div>

    </body>
</html>
